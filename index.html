<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>中文量词大师 · HSK2-3 拓展练习</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: system-ui, 'Segoe UI', 'Noto Sans', 'PingFang SC', Roboto, Helvetica, Arial, sans-serif;
            background: #f4f9fe;
            color: #1a2c3e;
            padding: 20px 16px 48px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .hero {
            text-align: center;
            margin-bottom: 2rem;
        }
        .hero h1 {
            font-size: 1.9rem;
            background: linear-gradient(135deg, #1f6392, #3c9eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .hero p {
            color: #5b6e8c;
            margin-top: 8px;
        }

        .section-card {
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            margin-bottom: 2rem;
            overflow: hidden;
        }
        .section-header {
            padding: 1.2rem 1.5rem 0.5rem;
            border-bottom: 2px solid #eef2f8;
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 8px;
        }
        .section-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1e4663;
        }
        .badge {
            background: #e8f0fe;
            color: #2c6e9e;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 500;
        }
        .section-content {
            padding: 1.5rem;
        }

        .measure-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 1.2rem;
        }
        .measure-card {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border: 1px solid #e3ebf3;
            overflow: hidden;
            transition: 0.1s;
        }
        .card-top {
            background: #f5faff;
            padding: 1rem;
            text-align: center;
        }
        .chinese-char {
            font-size: 3.5rem;
            font-weight: 700;
            color: #246b9e;
        }
        .pinyin {
            font-size: 1.1rem;
            color: #5d7e9e;
        }
        .audio-btn {
            background: #eef2fa;
            border: none;
            font-size: 1rem;
            padding: 5px 16px;
            border-radius: 50px;
            margin-top: 8px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #2c6b9e;
        }
        .collocations {
            padding: 0.9rem;
        }
        .collocations h4 {
            font-size: 0.8rem;
            color: #8ba0bc;
            margin-bottom: 8px;
        }
        .example-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .example-tag {
            background: #f2f5f9;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .micro-placeholder {
            background: #fafcff;
            border: 2px dashed #bed6e8;
            border-radius: 24px;
            padding: 2rem;
            text-align: center;
            color: #6f95bb;
        }
        .micro-placeholder video {
            border-radius: 12px;
            background: #000;
            max-width: 100%;
        }
        .micro-placeholder .video-label {
            margin-top: 10px;
            font-size: 0.75rem;
            color: #6f95bb;
        }

        .drag-panel {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .drag-items-row {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            justify-content: center;
            margin-bottom: 8px;
        }
        .drag-word {
            background: #eef3fc;
            border-radius: 60px;
            padding: 12px 28px;
            font-size: 1.6rem;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            user-select: none;
            transition: 0.1s;
            border: 1px solid #cddde9;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            touch-action: manipulation;
        }
        .drag-word:active {
            background: #d9e6f5;
            transform: scale(0.97);
        }
        .drag-word.selected {
            background: #c2e0ff;
            border: 2px solid #3c9eff;
            box-shadow: 0 0 0 2px rgba(60,158,255,0.3);
        }
        .targets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1.2rem;
            margin: 0.5rem 0;
        }
        .target-card {
            background: #ffffff;
            border: 2px solid #e2edf6;
            border-radius: 24px;
            padding: 1rem;
            text-align: center;
            transition: 0.1s;
            cursor: pointer;
            touch-action: manipulation;
        }
        .target-card.selected-target {
            border-color: #ffb347;
            background-color: #fff7e8;
        }
        .target-emoji {
            font-size: 2.8rem;
        }
        .target-name {
            font-weight: 500;
            margin: 6px 0;
        }
        .matched-badge {
            background: #cbe6fe;
            border-radius: 32px;
            padding: 6px;
            margin-top: 8px;
            font-weight: 600;
            color: #1f6392;
        }
        .unmatched-badge {
            background: #f0f4fa;
            border-radius: 32px;
            padding: 6px;
            margin-top: 8px;
            color: #7892ae;
            font-size: 0.85rem;
        }
        .feedback-bar {
            background: #ecf3f9;
            border-radius: 40px;
            padding: 12px 18px;
            text-align: center;
            font-weight: 500;
            margin-top: 20px;
        }
        .reset-exercise-btn {
            background: #eef2fa;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            margin-top: 12px;
            cursor: pointer;
        }

        .download-table {
            background: #fafdff;
            border-radius: 20px;
            border: 1px solid #e4edf5;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px 10px;
            text-align: left;
            border-bottom: 1px solid #e9eff5;
        }
        .btn-download {
            background: #1f6392;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            margin-top: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #95adc7;
        }
        @media (max-width: 600px) {
            .drag-word { padding: 8px 20px; font-size: 1.4rem; }
            .targets-grid { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 420px) {
            .targets-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1>📦 量词大师 · 学中文</h1>
        <p>HSK 2-3 级 | 拓展量词：个 · 只(zhī) · 张 · 本 · 杯 · 双 · 件 · 辆</p>
    </div>

    <!-- 第一部分 量词卡片 (8个常用量词) -->
    <div class="section-card">
        <div class="section-header">
            <h2>📖 量词小课堂</h2>
            <span class="badge">书写 · 发音 · 搭配</span>
        </div>
        <div class="section-content">
            <div class="measure-grid" id="measureGrid"></div>
        </div>
    </div>

    <!-- 第二部分 微课视频 -->
    <div class="section-card">
        <div class="section-header">
            <h2>🎬 微课视频</h2>
            <span class="badge">相对路径引用</span>
        </div>
        <div class="section-content">
            <div class="micro-placeholder">
                <!-- 
                    ★ 视频引用说明 ★
                    HTML文件位置：C:\Users\LX\Desktop\新建文件夹 (2)\deepseek_html_20260615_5c0b1d.html
                    视频文件位置：C:\Users\LX\Desktop\新建文件夹 (2)\lesson.mp4.mp4
                    两者位于同一文件夹，使用相对路径直接引用文件名。
                -->
                <video controls preload="metadata" style="width:100%; max-width:800px; border-radius:12px; background:#000;">
                    <source src="lesson.mp4.mp4" type="video/mp4">
                    您的浏览器不支持 HTML5 视频，请升级浏览器后观看。
                </video>
                <div class="video-label">📁 视频文件：lesson.mp4.mp4（与HTML同目录）</div>
            </div>
        </div>
    </div>

    <!-- 第三部分 互动练习 8组 -->
    <div class="section-card">
        <div class="section-header">
            <h2>🧩 互动练习</h2>
            <span class="badge">点选量词 → 点击物品配对 (共8组)</span>
        </div>
        <div class="section-content">
            <div class="drag-panel">
                <div class="drag-items-row" id="dragWordsContainer"></div>
                <div class="targets-grid" id="targetsContainer"></div>
                <div class="feedback-bar" id="globalFeedback">✨ 点击上面的量词，再点击物品图片，完成配对 ✨</div>
                <button class="reset-exercise-btn" id="resetGameBtn">🔄 重置全部配对</button>
            </div>
        </div>
    </div>

    <!-- 第四部分 下载搭配表 -->
    <div class="section-card">
        <div class="section-header">
            <h2>📄 量词搭配表</h2>
            <span class="badge">下载打印版 · 8个常用量词</span>
        </div>
        <div class="section-content">
            <div class="download-table">
                <table id="collocationTable">
                    <thead><tr><th>量词</th><th>拼音</th><th>常用搭配示例</th></tr></thead>
                    <tbody id="tableBody"></tbody>
                </table>
                <button class="btn-download" id="downloadCsvBtn">📎 下载搭配表 (CSV文件)</button>
                <p style="font-size:0.7rem; margin-top:10px;">* 包含完整量词列表，可离线复习</p>
            </div>
        </div>
    </div>
    <footer>🎧 配对正确/错误会有语音反馈！ 注意："只"读第一声 zhī</footer>
</div>

<script>
    // ----------------------------- 1. 量词数据 (8个) 重点修正"只"的读音数据，确保发音为一声 -----------------------------
    const measureList = [
        { word: "个", pinyin: "gè", pronounceText: "个", examples: ["一个苹果", "一个人", "一个杯子", "一个学生"] },
        { word: "只", pinyin: "zhī", pronounceText: "只", examples: ["一只猫", "一只鸟", "一只狗", "一只兔子"] },
        { word: "张", pinyin: "zhāng", pronounceText: "张", examples: ["一张纸", "一张桌子", "一张照片", "一张票"] },
        { word: "本", pinyin: "běn", pronounceText: "本", examples: ["一本书", "一本词典", "一本笔记本", "一本杂志"] },
        { word: "杯", pinyin: "bēi", pronounceText: "杯", examples: ["一杯水", "一杯茶", "一杯咖啡", "一杯牛奶"] },
        { word: "双", pinyin: "shuāng", pronounceText: "双", examples: ["一双鞋", "一双袜子", "一双筷子", "一双手"] },
        { word: "件", pinyin: "jiàn", pronounceText: "件", examples: ["一件衣服", "一件事", "一件礼物", "一件行李"] },
        { word: "辆", pinyin: "liàng", pronounceText: "辆", examples: ["一辆车", "一辆自行车", "一辆公交车", "一辆出租车"] }
    ];

    // 增强语音函数：确保"只"发音正确（浏览器合成器默认智能，但通过显式文本"只"即可，为了保证万无一失，使用完整词）
    function speakChinese(text) {
        if (!window.speechSynthesis) {
            console.warn("浏览器不支持语音");
            alert("您的浏览器不支持语音播放，请升级或使用现代浏览器。");
            return;
        }
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = "zh-CN";
        utterance.rate = 0.85;
        window.speechSynthesis.speak(utterance);
    }

    function buildMeasureCards() {
        const grid = document.getElementById("measureGrid");
        grid.innerHTML = "";
        measureList.forEach(m => {
            const card = document.createElement("div");
            card.className = "measure-card";
            card.innerHTML = `
                <div class="card-top">
                    <div class="chinese-char">${m.word}</div>
                    <div class="pinyin">${m.pinyin}</div>
                    <button class="audio-btn" data-word="${m.word}" data-pronounce="${m.pronounceText}">🔊 发音</button>
                </div>
                <div class="collocations">
                    <h4>📌 常见搭配</h4>
                    <div class="example-list">
                        ${m.examples.map(ex => `<span class="example-tag">${ex}</span>`).join('')}
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
        document.querySelectorAll(".audio-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                const word = btn.getAttribute("data-word");
                speakChinese(word);
            });
        });
    }

    // ----------------------------- 2. 互动练习 (8组物品) -----------------------------
    const itemsData = [
        { id: "apple", name: "苹果", emoji: "🍎", correct: "个" },
        { id: "cat", name: "猫", emoji: "🐱", correct: "只" },
        { id: "paper", name: "纸", emoji: "📄", correct: "张" },
        { id: "book", name: "书", emoji: "📖", correct: "本" },
        { id: "coffee", name: "咖啡", emoji: "☕", correct: "杯" },
        { id: "shoes", name: "鞋子", emoji: "👟", correct: "双" },
        { id: "shirt", name: "衣服", emoji: "👕", correct: "件" },
        { id: "car", name: "汽车", emoji: "🚗", correct: "辆" }
    ];

    let gameState = {
        matched: {
            apple: null, cat: null, paper: null, book: null,
            coffee: null, shoes: null, shirt: null, car: null
        },
        selectedMeasure: null,
    };

    function renderDragWords() {
        const container = document.getElementById("dragWordsContainer");
        container.innerHTML = "";
        const usedMeasures = Object.values(gameState.matched).filter(v => v !== null);
        
        measureList.forEach(measureObj => {
            const measure = measureObj.word;
            const isUsed = usedMeasures.includes(measure);
            const btn = document.createElement("div");
            btn.className = "drag-word";
            if (gameState.selectedMeasure === measure && !isUsed) btn.classList.add("selected");
            if (isUsed) {
                btn.style.opacity = "0.5";
                btn.style.background = "#e2e8f0";
                btn.style.cursor = "default";
                btn.innerText = `${measure} ✓`;
                btn.addEventListener("click", (e) => {
                    e.stopPropagation();
                    document.getElementById("globalFeedback").innerHTML = `🔒 量词"${measure}"已经配对过了！重置后可重新练习。`;
                    speakChinese("这个量词已经用过了");
                });
            } else {
                btn.innerText = measure;
                btn.dataset.measure = measure;
                btn.addEventListener("click", (e) => {
                    e.stopPropagation();
                    if (gameState.selectedMeasure === measure) {
                        gameState.selectedMeasure = null;
                    } else {
                        gameState.selectedMeasure = measure;
                    }
                    renderDragWords();
                    renderTargets();
                    document.getElementById("globalFeedback").innerHTML = `👉 当前选中量词：${gameState.selectedMeasure || "无"}，点击对应物品配对`;
                });
            }
            container.appendChild(btn);
        });
    }

    function renderTargets() {
        const container = document.getElementById("targetsContainer");
        container.innerHTML = "";
        itemsData.forEach(item => {
            const matchedMeasure = gameState.matched[item.id];
            const isMatched = matchedMeasure !== null;
            const targetDiv = document.createElement("div");
            targetDiv.className = "target-card";
            if (gameState.selectedMeasure && !isMatched) targetDiv.classList.add("selected-target");
            targetDiv.dataset.id = item.id;
            targetDiv.dataset.correct = item.correct;
            targetDiv.innerHTML = `
                <div class="target-emoji">${item.emoji}</div>
                <div class="target-name">${item.name}</div>
                ${isMatched ? `<div class="matched-badge">✓ ${matchedMeasure}</div>` : `<div class="unmatched-badge">⬅️ 点击配对</div>`}
            `;
            if (!isMatched) {
                targetDiv.addEventListener("click", (e) => {
                    e.stopPropagation();
                    attemptMatch(item.id);
                });
            } else {
                targetDiv.style.opacity = "0.85";
            }
            container.appendChild(targetDiv);
        });
    }

    function attemptMatch(itemId) {
        const item = itemsData.find(i => i.id === itemId);
        if (!item) return;
        if (gameState.matched[itemId] !== null) {
            document.getElementById("globalFeedback").innerHTML = `⏳ ${item.name} 已经配对过了！如需重试请点击"重置全部配对"`;
            speakChinese("已经配对过了");
            return;
        }
        const selected = gameState.selectedMeasure;
        if (!selected) {
            document.getElementById("globalFeedback").innerHTML = `⚠️ 请先点击上方量词（个/只/张/本/杯/双/件/辆）再点击 ${item.name} 哟！`;
            speakChinese("请先选择量词");
            return;
        }
        const alreadyUsedOnOther = Object.entries(gameState.matched).some(([id, m]) => m === selected && id !== itemId);
        if (alreadyUsedOnOther) {
            document.getElementById("globalFeedback").innerHTML = `❌ 量词"${selected}"已经和别的物品配对了！每个量词只能使用一次，请重置或选择其他量词。`;
            speakChinese("这个量词已经用过了");
            return;
        }

        if (selected === item.correct) {
            gameState.matched[itemId] = selected;
            gameState.selectedMeasure = null;
            document.getElementById("globalFeedback").innerHTML = `✅ 很棒！ "${selected} ${item.name}" 配对正确！ 🎉`;
            speakChinese(`很棒，${selected} ${item.name} 配对正确`);
            const allMatched = Object.values(gameState.matched).every(v => v !== null);
            if (allMatched) {
                document.getElementById("globalFeedback").innerHTML = `🏆 恭喜你完成了全部8组量词配对！你已经是量词小专家啦！ 🏆`;
                speakChinese("恭喜你完成了全部练习，太厉害了");
            }
            renderDragWords();
            renderTargets();
        } else {
            document.getElementById("globalFeedback").innerHTML = `❌ 配对错误： "${selected}" 不能用于 "${item.name}"，正确答案是 "${item.correct}"。再试试看！`;
            speakChinese(`配对错误，${selected} 不匹配 ${item.name}`);
            renderTargets();
            renderDragWords();
        }
    }

    function resetGame() {
        gameState = {
            matched: {
                apple: null, cat: null, paper: null, book: null,
                coffee: null, shoes: null, shirt: null, car: null
            },
            selectedMeasure: null,
        };
        if (window.speechSynthesis) window.speechSynthesis.cancel();
        document.getElementById("globalFeedback").innerHTML = "🔄 已重置练习！所有量词和物品重新开始配对 💪";
        renderDragWords();
        renderTargets();
        speakChinese("练习已重置");
    }

    // ----------------------------- 3. 下载搭配表 (修正拼音) -----------------------------
    function buildTableBody() {
        const tbody = document.getElementById("tableBody");
        tbody.innerHTML = "";
        const fullData = [
            ["个", "gè", "一个苹果、一个人、一个学生、一个杯子"],
            ["只", "zhī", "一只猫、一只鸟、一只狗、一只兔子"],
            ["张", "zhāng", "一张纸、一张桌子、一张照片、一张票"],
            ["本", "běn", "一本书、一本词典、一本笔记本、一本杂志"],
            ["杯", "bēi", "一杯水、一杯茶、一杯咖啡、一杯牛奶"],
            ["双", "shuāng", "一双鞋、一双袜子、一双筷子、一双手"],
            ["件", "jiàn", "一件衣服、一件事、一件礼物、一件行李"],
            ["辆", "liàng", "一辆车、一辆自行车、一辆公交车、一辆出租车"]
        ];
        fullData.forEach(row => {
            const tr = document.createElement("tr");
            tr.innerHTML = `<td>${row[0]}</td><td>${row[1]}</td><td>${row[2]}</td>`;
            tbody.appendChild(tr);
        });
    }

    function generateAndDownloadCSV() {
        const rows = [
            ["量词", "拼音", "常用搭配示例"],
            ["个", "gè", "一个苹果、一个人、一个学生、一个杯子"],
            ["只", "zhī", "一只猫、一只鸟、一只狗、一只兔子"],
            ["张", "zhāng", "一张纸、一张桌子、一张照片、一张票"],
            ["本", "běn", "一本书、一本词典、一本笔记本、一本杂志"],
            ["杯", "bēi", "一杯水、一杯茶、一杯咖啡、一杯牛奶"],
            ["双", "shuāng", "一双鞋、一双袜子、一双筷子、一双手"],
            ["件", "jiàn", "一件衣服、一件事、一件礼物、一件行李"],
            ["辆", "liàng", "一辆车、一辆自行车、一辆公交车、一辆出租车"]
        ];
        let csv = rows.map(row => row.map(cell => `"${cell}"`).join(",")).join("\n");
        const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.setAttribute("download", "量词搭配表_HSK2_3_拓展版.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    }

    function init() {
        buildMeasureCards();
        buildTableBody();
        resetGame();
